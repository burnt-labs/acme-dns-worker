name: Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.BURNT_CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.BURNT_CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
          packageManager: pnpm
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.preview.outputs.command-output }}`;
            const versionMatch = output.match(/Version ID:\s+([a-f0-9-]+)/);
            const versionId = versionMatch ? versionMatch[1] : 'unknown';

            const body = [
              '### 🚀 Preview Deployment',
              '',
              `**Version ID:** \`${versionId}\``,
              '',
              'This version has been uploaded but not deployed.',
              `To deploy: \`npx wrangler versions deploy ${versionId} --percentage 100\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('### 🚀 Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
